<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Дашборд детекции дипфейков</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Дашборд детекции дипфейков</h1>
            <p class="auth-subtitle">Войдите для продолжения</p>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" required autofocus
                           value="{{ request.form.get('username', '') }}">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Войти</button>
            </form>

            <p class="auth-link">Нет аккаунта? <a href="{{ url_for('signup') }}">Зарегистрироваться</a></p>
        </div>
    </div>
</body>
</html>
