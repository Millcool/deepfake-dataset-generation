services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - MIEM_TOKEN=${MIEM_TOKEN}
      - RUNS_DIR=/app/data/runs
      - DATABASE_PATH=/app/data/dashboard.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - runs_data:/app/data/runs
      - db_data:/app/data
      - registry_data:/app/dashboard
    expose:
      - "5050"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  runs_data:
  db_data:
  registry_data:
